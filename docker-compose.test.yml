version: '3.8'

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: s1m0n-test
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    command: pytest -v --tb=short --color=yes
    
  test-with-coverage:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: s1m0n-test-coverage
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    command: pytest -v --cov=src --cov-report=term-missing --cov-report=html --tb=short --color=yes
    
  lint:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: s1m0n-lint
    volumes:
      - .:/app
    command: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
