version: '3.8'

services:
  # ============================================================================
  # DASHBOARD - Interface web (porta 5000)
  # ============================================================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s1m0n-dashboard
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/__pycache__
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - FLASK_ENV=development
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - s1m0n-network
    command: python dashboard_launcher.py

  # ============================================================================
  # ROBOT - Processador de conteúdo (executa em background)
  # ============================================================================
  robot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s1m0n-robot
    volumes:
      - .:/app
      - /app/__pycache__
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      dashboard:
        condition: service_healthy
    networks:
      - s1m0n-network
    command: python main.py
    restart: unless-stopped

  # ============================================================================
  # DB - SQLite (opcional: para inspeção)
  # ============================================================================
  db:
    image: ubuntu:latest
    container_name: s1m0n-db-helper
    volumes:
      - .:/app
    networks:
      - s1m0n-network
    command: /bin/bash -c "while true; do sleep 1000; done"

networks:
  s1m0n-network:
    driver: bridge
